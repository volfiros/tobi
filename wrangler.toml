name = "tobi"
main = "src/index.ts"
compatibility_date = "2026-05-19"

[vars]
APP_ENV = "production"
PUBLIC_APP_URL = "https://tobi.rithvik-padma.workers.dev"
DEFAULT_CURRENCY = "INR"
DEMO_SHOP_ID = "shop_demo"
DEMO_SHOP_NAME = "Tobi Demo Print Shop"
GEMINI_DEFAULT_MODEL = "gemini-2.5-flash-lite"
WHATSAPP_PHONE_NUMBER_ID = "1137774582758778"
WHATSAPP_BUSINESS_ACCOUNT_ID = "26541381265544284"
WHATSAPP_GRAPH_API_VERSION = "v25.0"

[[d1_databases]]
binding = "DB"
database_name = "tobi-demo-db"
database_id = "6503419a-c47a-4ab3-9ce1-7394f00495e8"
migrations_dir = "src/db/migrations"

[[r2_buckets]]
binding = "FILES"
bucket_name = "tobi-demo-files"

[[kv_namespaces]]
binding = "SESSIONS"
id = "df3066f19f0346428b607203046b09e2"

[[queues.producers]]
binding = "JOB_QUEUE"
queue = "tobi-demo-jobs"
