<svg width="780" height="220" viewBox="0 0 780 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tobi print-ordering assistant logo</title>
  <desc id="desc">Animated Tobi wordmark with a printer icon, moving paper, and scanning accent line.</desc>
  <style>
    :root {
      --ink: #272733;
      --muted: #6e6f7c;
      --accent: #5947e8;
      --accent-2: #8c7cff;
      --paper: #ffffff;
      --panel: #fafaff;
      --line: #e5e3f6;
      --glow: #ece9ff;
    }

    .paper {
      animation: feed 3.8s ease-in-out infinite;
      transform-origin: 92px 86px;
    }

    .scanner {
      animation: scan 3.8s ease-in-out infinite;
      transform-origin: center;
    }

    .dot {
      animation: pulse 2.4s ease-in-out infinite;
      transform-origin: center;
    }

    .dot-2 {
      animation-delay: .25s;
    }

    .dot-3 {
      animation-delay: .5s;
    }

    .spark {
      animation: sparkle 3.8s ease-in-out infinite;
      transform-origin: center;
    }

    .spark-2 {
      animation-delay: 1.2s;
    }

    .wordmark {
      animation: breathe 5s ease-in-out infinite;
      transform-origin: 408px 110px;
    }

    @keyframes feed {
      0%, 100% { transform: translateY(0); }
      38% { transform: translateY(12px); }
      58% { transform: translateY(5px); }
    }

    @keyframes scan {
      0%, 28%, 100% { transform: translateY(0); opacity: .55; }
      45% { transform: translateY(46px); opacity: 1; }
      65% { transform: translateY(14px); opacity: .75; }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(.92); opacity: .55; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    @keyframes sparkle {
      0%, 35%, 100% { transform: scale(.72) rotate(0deg); opacity: .18; }
      50% { transform: scale(1.08) rotate(12deg); opacity: .9; }
    }

    @keyframes breathe {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #f3f2ff;
        --muted: #b8b5ce;
        --paper: #171724;
        --panel: #151521;
        --line: #2a2944;
        --glow: #241f55;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .paper,
      .scanner,
      .dot,
      .spark,
      .wordmark {
        animation: none;
      }
    }
  </style>

  <defs>
    <radialGradient id="luminalGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(628 58) rotate(136) scale(266 150)">
      <stop stop-color="var(--glow)"/>
      <stop offset="1" stop-color="var(--panel)" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="printerAccent" x1="0" y1="78" x2="184" y2="144" gradientUnits="userSpaceOnUse">
      <stop stop-color="var(--accent)"/>
      <stop offset="1" stop-color="var(--accent-2)"/>
    </linearGradient>
  </defs>

  <rect x="7" y="7" width="766" height="206" rx="34" fill="var(--panel)" stroke="var(--line)" stroke-width="2"/>
  <rect x="7" y="7" width="766" height="206" rx="34" fill="url(#luminalGlow)"/>
  <circle class="spark spark-1" cx="665" cy="55" r="8" fill="var(--accent-2)" opacity=".7"/>
  <circle class="spark spark-2" cx="704" cy="151" r="5" fill="var(--accent)" opacity=".7"/>

  <g transform="translate(58 38)">
    <rect class="paper" x="42" y="0" width="100" height="78" rx="10" fill="var(--paper)" stroke="var(--line)" stroke-width="4"/>
    <path class="paper" d="M62 25H122M62 43H110" stroke="var(--muted)" stroke-width="6" stroke-linecap="round"/>

    <rect x="17" y="55" width="150" height="88" rx="22" fill="var(--ink)"/>
    <rect x="0" y="78" width="184" height="66" rx="22" fill="url(#printerAccent)"/>
    <rect x="44" y="112" width="96" height="70" rx="12" fill="var(--paper)" stroke="var(--ink)" stroke-width="4"/>
    <path d="M62 139H122M62 158H106" stroke="var(--muted)" stroke-width="6" stroke-linecap="round"/>
    <rect class="scanner" x="50" y="128" width="84" height="7" rx="3.5" fill="var(--accent-2)"/>

    <circle class="dot dot-1" cx="139" cy="95" r="6" fill="var(--paper)"/>
    <circle class="dot dot-2" cx="157" cy="95" r="6" fill="var(--paper)" opacity=".82"/>
    <circle class="dot dot-3" cx="175" cy="95" r="6" fill="var(--paper)" opacity=".64"/>
  </g>

  <g class="wordmark">
    <text x="282" y="124" fill="var(--ink)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="92" font-weight="850" letter-spacing="0">tobi</text>
    <text x="288" y="160" fill="var(--muted)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="650" letter-spacing="0">WhatsApp print orders, paid and tracked</text>
    <path d="M286 176H570" stroke="var(--accent)" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>
