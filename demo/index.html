<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tobi Demo Video</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101413;
        --panel: #171d1b;
        --text: #eef6f1;
        --muted: #a8b7af;
        --accent: #48d597;
        --border: #2a3631;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 48px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand img {
        width: 48px;
        height: 48px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.15;
        letter-spacing: 0;
      }

      p {
        margin: 6px 0 0;
        color: var(--muted);
        line-height: 1.5;
      }

      a {
        color: var(--accent);
        font-weight: 650;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .video-shell {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
      }

      video {
        display: block;
        width: 100%;
        aspect-ratio: 1280 / 832;
        border-radius: 4px;
        background: #000;
      }

      .links {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        margin-top: 16px;
      }

      @media (max-width: 640px) {
        header {
          align-items: flex-start;
          flex-direction: column;
        }

        h1 {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div class="brand">
          <img src="../assets/tobi-logo-luminal.svg" alt="" aria-hidden="true">
          <div>
            <h1>Tobi Demo Video</h1>
            <p>WhatsApp-native print ordering, quote confirmation, and payment flow.</p>
          </div>
        </div>
        <a href="https://github.com/volfiros/tobi">View repository</a>
      </header>

      <section class="video-shell" aria-label="Tobi demo video">
        <video controls preload="metadata" playsinline poster="../assets/tobi-logo-luminal.svg">
          <source src="../assets/tobi-demo.mp4" type="video/mp4">
          Your browser does not support the video element.
        </video>
      </section>

      <nav class="links" aria-label="Demo links">
        <a href="../assets/tobi-demo.mp4">Open MP4 directly</a>
        <a href="https://wa.me/918074009337?text=Hi%20Tobi%2C%20I%20want%20to%20print%20a%20PDF">Test Tobi on WhatsApp</a>
      </nav>
    </main>
  </body>
</html>
